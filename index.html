body{background:var(--night);color:var(--cream);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;justify-content:center;touch-action:manipulation}

.meter{flex:1;min-width:0}
.meter .lab{font-size:8px;letter-spacing:1px;color:var(--mist);margin-bottom:4px;white-space:nowrap}
.blocks{display:flex;gap:2px}
.blocks i{flex:1;height:8px;background:#343B63;border:1px solid var(--line)}
.m-signal i.on{background:var(--ember)}
.m-rhythm i.on{background:var(--moss)}

.m-prog i.on{background:var(--gold)}
#heartBtn,#helpBtn{width:36px;height:36px;flex:none;background:var(--panel);border:3px solid var(--line);box-shadow:0 3px 0 var(--line);color:var(--cream);font-size:15px;line-height:1}
#heartBtn:active,#helpBtn:active{transform:translateY(3px);box-shadow:none}

#meta{display:flex;justify-content:space-between;align-items:center;padding:8px 14px 0}

.hintline{font-size:12px;color:var(--dim);padding:0 4px}
.task{background:#33290F;border:3px solid var(--goldD);box-shadow:0 3px 0 var(--line);padding:10px 12px;font-size:14px;line-height:1.45;color:var(--gold);font-weight:700}
.task .px{font-size:9px;letter-spacing:1px}
.hiddenF{display:none}
.chip{background:var(--deep);border:3px solid var(--line);box-shadow:0 3px 0 var(--line);color:var(--cream);padding:10px 12px;font-size:14px;text-align:left}

.small{font-size:11.5px;color:var(--dim)}

#flameW{transition:none}
}
#flameW{transform-box:fill-box;transform-origin:50% 100%;animation:brz 1.5s ease-in-out infinite}
@keyframes brz{0%,100%{transform:scale(var(--fs,1))}50%{transform:scale(calc(var(--fs,1)*1.045))}}
.arr{float:right;color:var(--goldD)}
#heroBr,.brB{animation:brh 4.4s ease-in-out infinite}
@keyframes brh{0%,100%{transform:translateY(0)}50%{transform:translateY(-1px)}}
#eyesG rect,.blinkE rect{transform-box:fill-box;transform-origin:50% 50%;animation:blink 4.6s steps(1) infinite}
@keyframes blink{0%,91%,100%{transform:scaleY(1)}93%,96%{transform:scaleY(.12)}}
.dstar{position:absolute;left:50%;top:15px;transform:translateX(-50%);color:var(--gold);font-size:13px;font-style:normal;text-shadow:0 2px 0 var(--line)}
@media (prefers-reduced-motion:reduce){#heroBr,#eyesG rect,.brB,.blinkE rect,.mote{animation:none}}
#corrV{position:relative;height:210px;overflow:hidden;border:3px solid var(--line);box-shadow:0 4px 0 var(--line);background:#1C3A74}
#corrIn{position:absolute;left:0;top:0;height:210px;will-change:transform}
#heroM{position:absolute;top:100px;width:52px;height:78px}
#heroM .faceW{width:100%;height:100%;transform-origin:50% 50%}
#heroM .mfl{position:absolute;left:14px;top:-26px}
.corrArr{width:52px;padding:10px 0;font-size:15px;text-align:center;flex:none}
.beakP{fill:var(--gold);animation:beakA 1.3s ease-in-out infinite;pointer-events:none}
@keyframes beakA{0%,100%{opacity:.35}50%{opacity:.95}}
#actions .chip{transition:transform .12s}
.abtn .stat{display:block;font-size:10.5px;color:var(--goldD);margin-top:5px;letter-spacing:.5px}
.tdots{display:flex;gap:6px;justify-content:center}
.tdot{width:8px;height:8px;background:#343B66;border:1px solid var(--line)}
.tdot.on{background:var(--gold)}
.m-signal .blocks i.on{background:#FF8A2A}
.m-rhythm .blocks i.on{background:#37B9A5}
.m-energy .blocks i.on{background:#FFE9A8}
.m-prog.inv .blocks i.on{background:#7C5CB0}
.m-signal .lab{color:#FF9E55}
.m-rhythm .lab{color:#6FCf9B}
.m-energy .lab{color:#EFE0B8}
#stage{isolation:isolate}
#atmos{pointer-events:none}
.mote{transform-box:fill-box;transform-origin:center;animation:agFloat 8s ease-in-out infinite;will-change:transform,opacity}
#corrV{isolation:isolate}
#corrV::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:6;background:radial-gradient(125% 88% at 50% 40%,transparent 52%,rgba(5,4,12,.5))}
@keyframes agFloat{0%{transform:translate(0,0);opacity:.12}50%{transform:translate(1px,-7px);opacity:.5}100%{transform:translate(0,0);opacity:.12}}
/* ноутбук: сцена зліва, розмова і вибори справа */
@media (min-width:880px) and (min-height:520px){
 #wrap{max-width:1240px}
 #intro,#mirror{max-width:640px;margin:0 auto;width:100%}
 #map{max-width:780px;margin:0 auto;width:100%}
 .meter{max-width:200px}
 #helpBtn{margin-left:auto}
 #game{display:grid;grid-template-columns:minmax(0,56%) minmax(0,44%);grid-template-rows:auto 1fr;align-content:start}
 #game #stageBox{grid-column:1;grid-row:1/3;padding:10px 0 14px 14px;align-self:start}
 #game #dialog{grid-column:2;grid-row:1;margin:10px 14px 8px 12px}
 #game #actions{grid-column:2;grid-row:2;padding:0 14px 20px 12px;min-height:0}
}

route:[],choice:null,anchor:null,act:null,day:1,snap:null,dreamed:false,sickPending:false,skipped:false,pullHinted:false,pigOn:false,ep:1,lastTask:""};
var C={pal:0,pat:0,curtain:false,chair:false,plant:false};
var G={nameIdx:1,eps:[false,false,false,false,false,false,false]};
var AB="АВГДЕЄЖИЇКЛМНПРСТУФХЦШЮЯ23456789";
function packCode(){var m=0;for(var i=0;i<7;i++){if(G.eps[i])m|=(1<<i)}
var v=(G.nameIdx<<14)|(C.pal<<12)|(C.pat<<10)|((C.curtain?1:0)<<9)|((C.chair?1:0)<<8)|((C.plant?1:0)<<7)|m;
var c=[(v>>15)&31,(v>>10)&31,(v>>5)&31,v&31];var chk=(c[0]+c[1]+c[2]+c[3])%32;
return "ДІМ-"+AB[c[0]]+AB[c[1]]+AB[c[2]]+AB[c[3]]+AB[chk]}
function parseCode(t){t=(t||"").toUpperCase();
var L2C={"A":"А","B":"В","C":"С","E":"Е","H":"Н","K":"К","M":"М","P":"Р","T":"Т","X":"Х","Y":"У"};
t=t.split("").map(function(ch){return L2C[ch]||ch}).join("");
var f="";for(var i=0;i<t.length;i++){if(AB.indexOf(t[i])>=0)f+=t[i]}
if(f.length<5)return null;f=f.slice(-5);var c=[];for(i=0;i<5;i++){c.push(AB.indexOf(f[i]))}
if((c[0]+c[1]+c[2]+c[3])%32!==c[4])return null;
var v=(c[0]<<15)|(c[1]<<10)|(c[2]<<5)|c[3];
return {nameIdx:(v>>14)&3,pal:(v>>12)&3,pat:(v>>10)&3,curtain:!!((v>>9)&1),chair:!!((v>>8)&1),plant:!!((v>>7)&1),eps:v&127}}
var PALS=[{n:"Синя",wall:"#35578E",floor:"#24468A",pat:"#222948"},
{n:"Зелена",wall:"#26433A",floor:"#14231C",pat:"#1E382F"},
{n:"Бежева",wall:"#5C5040",floor:"#3A3125",pat:"#4E4335"}];
var PATS=["Без візерунка","Зірочки на підлозі","Спіральки на стінах","Смужки на стінах"];

function $(id){return document.getElementById(id)}
function clamp(v){return Math.max(0,Math.min(100,v))}
function buildBlocks(el){var h="";for(var i=0;i<10;i++)h+="<i></i>";el.innerHTML=h}
buildBlocks($("mSig"));buildBlocks($("mRhy"));buildBlocks($("mEn"));buildBlocks($("mPr"));

function setMeter(el,val){var ks=el.children,n=Math.round(clamp(val)/10);
for(var i=0;i<10;i++){ks[i].className=i<n?"on":""}}
function refresh(){
setMeter($("mSig"),S.signal);setMeter($("mRhy"),S.rhythm);setMeter($("mEn"),S.energy);setMeter($("mPr"),S.prog);
var fs=0.55+S.signal/100*1.05;$("flameW").style.setProperty("--fs",fs.toFixed(2));$("flameW").style.opacity=S.energy<25?".62":"1";
if(S.ep===4){$("shadowW").style.transform="scale("+(0.45+S.prog/100*0.95).toFixed(2)+")"}
if(S.ep===1&&S.prog>0)$("scr").setAttribute("fill","#BFE3FF");
}

$("wall").setAttribute("fill",p.wall);

["stripesG","spiralsG"].forEach(function(id){
Array.prototype.forEach.call($(id).querySelectorAll("rect"),function(r){r.setAttribute("fill",p.pat)});
});

$("stripesG").classList.toggle("hiddenF",C.pat!==3);

$("chairG").classList.toggle("hiddenF",!C.chair);
$("plantG").classList.toggle("hiddenF",!C.plant);

$("photoG").classList.toggle("hiddenF",!G.eps[2]);
$("mirG").classList.toggle("hiddenF",!(G.eps[3]||S.mirrorOn));
$("pledG").classList.toggle("hiddenF",!G.eps[4]);
$("postG").classList.toggle("hiddenF",!G.eps[5]);
$("starWinG").classList.toggle("hiddenF",!G.eps[6]);
}
function setRoomMode(mode){
$("deskG").classList.toggle("hiddenF",mode==="bed");
$("bedG").classList.toggle("hiddenF",mode!=="bed");
if(mode==="bed")$("plantG").classList.add("hiddenF");else $("plantG").classList.toggle("hiddenF",!C.plant);
}

var dq=[],dcb=null,typing=false,ti=null,full="";
function say(lines,cb){dq=lines.slice();dcb=cb;$("dialog").style.minHeight="";$("actions").innerHTML="";nextLine()}
function nextLine(){
if(typing){clearInterval(ti);typing=false;$("txt").textContent=full;$("cue").classList.remove("hidden");return}
if(!dq.length){$("cue").classList.add("hidden");if(dcb){var c=dcb;dcb=null;c()}return}
var L=dq.shift();renderSpk(L.w);typeText(L.t)
}
function renderSpk(w){var s=$("spk");
if(w==="s"){s.className="s";s.innerHTML='<span class="flameDot"></span><span class="px">СИГНАЛ</span>'}
else if(w==="t"){s.className="";s.innerHTML='<span class="flameDot" style="background:#161B33"></span><span class="px" style="color:#8A91BE">ТІНЬ</span>'}
else if(w==="h"){s.className="";s.innerHTML='<span class="px">'+esc(S.name.toUpperCase())+'</span>'}
else{s.className="";s.innerHTML='<span class="px">···</span>'}
}
function esc(t){return t.replace(/[<>&]/g,function(c){return c==="<"?"&lt;":c===">"?"&gt;":"&amp;"})}
function typeText(t){full=t;
var tx=$("txt");tx.textContent=full;
$("dialog").style.minHeight=Math.max(96,$("dialog").offsetHeight)+"px";
tx.textContent="";$("cue").classList.add("hidden");typing=true;var i=0;
ti=setInterval(function(){i+=2;$("txt").textContent=full.slice(0,i);
if(i>=full.length){clearInterval(ti);typing=false;$("cue").classList.remove("hidden")}},18)}
document.addEventListener("click",function(e){if(e.target.closest("button,input,textarea,#smodal,#fail,#flameTap"))return;nextLine()});
$("dialog").tabIndex=0;
$("dialog").addEventListener("keydown",function(e){if(e.key==="Enter"||e.key===" "){e.preventDefault();nextLine()}});

for(var i=0;i<7;i++){G.eps[i]=!!(r.eps&(1<<i))}

var DOORS=["Четвер близько","На щось більше","Повідомлення без відповіді","Дзеркало кривих слів","Тиждень на нулі","Двері, які лякають","Тиждень, зібраний власноруч"];

$("game").classList.add("hidden");$("hud").classList.add("hidden");$("meta").classList.add("hidden");
$("mirror").style.display="none";$("intro").classList.add("hidden");$("stub").style.display="none";

function doorEnter(i){var open7=G.eps[0]&&G.eps[1]&&G.eps[2]&&G.eps[3]&&G.eps[4]&&G.eps[5];
if(i===0){startEp1();return}
if(i===1){startEp2();return}
if(i===2){startEp3();return}
if(i===3){startEp4();return}
if(i===4){startEp5();return}
if(i===5){startEp6();return}
if(open7){startEp7();return}
stubShow("???","Зачинено. Двері відчиняться, коли на шістьох сусідніх зʼявляться зірки.");
}
var corrW=944,mapX=null,mapWalkT=null,mapNear=0;
function doorCx(i){return 90+i*112+22}
function camMap(){var vw=$("corrV").clientWidth;return Math.max(0,Math.min(corrW-vw,mapX+26-vw/2))}
function placeMap(x,dur){mapX=x;var h=$("heroM"),c=$("corrIn");
h.style.transition=dur?("left "+dur+"ms linear"):"none";
c.style.transition=dur?("transform "+dur+"ms linear"):"none";
h.style.left=x+"px";
c.style.transform="translateX(-"+camMap()+"px)"}
function capMap(){var best=0,bd=1e9;
for(var i=0;i<7;i++){var d=Math.abs(doorCx(i)-(mapX+26));if(d<bd){bd=d;best=i}}
var open7=G.eps[0]&&G.eps[1]&&G.eps[2]&&G.eps[3]&&G.eps[4]&&G.eps[5];
var lock=(best===6&&!open7);

#chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}

.olay{position:fixed;inset:0;background:rgba(8,6,20,.88);display:flex;align-items:center;justify-content:center;padding:14px;z-index:9}
.card{background:var(--deep);border:3px solid var(--line);box-shadow:0 4px 0 var(--line);max-width:348px;width:100%;padding:15px;display:flex;flex-direction:column;gap:10px;max-height:94vh;overflow:auto}
.card .cap{font-size:9px;color:var(--gold);letter-spacing:1px}
.card p{font-size:14px;line-height:1.6}
.card .statl{font-size:13px;color:var(--mist)}
.crow{display:flex;gap:8px}
.crow .abtn{max-width:none;text-align:center;margin:0}
#codeRow .abtn{margin:0}
.rule{display:flex;gap:9px;align-items:flex-start;font-size:13px;line-height:1.5;color:var(--mist)}
.rule b{color:var(--gold);font-size:9px;letter-spacing:1px;padding-top:3px;white-space:nowrap;min-width:74px}
.seamL{font-size:13px;color:var(--hot);border-left:3px solid var(--gold);padding-left:8px;line-height:1.5}
#codeBig{font-size:15px;color:var(--gold);letter-spacing:2px;text-align:center;border:3px dashed var(--goldD);padding:14px 8px;background:#2A2114;word-break:break-all}
#saveRow{display:flex;justify-content:center}

@media (prefers-reduced-motion:reduce){
.brB,.nBob,.ey,#cue,.flick .fA,.flick .fB,#hud.loud .blocks i.on{animation:none}
#doorL,#doorR{transition:none}
#stageBox.ride,#stageBox.loopf,#stageBox.push{animation:none}
}
.tapH{animation:tapP 2.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
@keyframes tapP{0%,86%,100%{opacity:1}92%{opacity:.72}}
@media (prefers-reduced-motion:reduce){.tapH{animation:none}}
/* ===== Обʼємне світло світу + вогник як джерело світла ===== */
#stage,#fstage,#bstage,#ostage,#kstage,#rstage,#cstage,#hstage,#wstage,#nstage,#gstage{isolation:isolate}
.ag{pointer-events:none}
.ag .mote{transform-box:fill-box;transform-origin:center;animation:agFloat 8s ease-in-out infinite;will-change:transform,opacity}
@keyframes agFloat{0%{transform:translate(0,0);opacity:.1}50%{transform:translate(1px,-6px);opacity:.5}100%{transform:translate(0,0);opacity:.1}}
.nvAura{transform-box:fill-box;transform-origin:center;opacity:.6;transition:opacity .55s ease,transform .55s ease}
#stageBox.loud .nvAura{opacity:.95;transform:scale(1.18)}
#stageBox.calm .nvAura{opacity:.5;transform:scale(.94)}
@media (prefers-reduced-motion:reduce){.ag .mote{animation:none}.nvAura{transition:none}}
/* ноутбук: ліфт зліва, розмова і вибори справа */
@media (min-width:880px) and (min-height:520px){
 #wrap{max-width:1240px}
 #intro{max-width:640px;margin:0 auto;width:100%}
 #panel,#mirror,#album,#chat{max-width:680px;margin:0 auto;width:100%}
 .meter{max-width:220px}
 #helpB{margin-left:auto}
 #game{display:grid;grid-template-columns:minmax(0,56%) minmax(0,44%);grid-template-rows:auto auto 1fr;align-content:start;column-gap:12px}
 #game #stageBox{grid-column:1;grid-row:1/4;align-self:start}
 #game #bar{grid-column:2;grid-row:1}
 #game #dialog{grid-column:2;grid-row:2}
 #game #actions{grid-column:2;grid-row:3;justify-content:flex-start}
}

.blocks i{background:#27488A;border-color:#0F2148}
</style>
</head>

function costs(o,A){

if(o.kind==="yield"){

c+=(yv<0)?tag("c-dn","тихіше. Тут згода заспокоює"):tag("c-up",C().upW||"гучніше");
if(C().clock)c+=tag("c-cl","годинник -1 хвилина");
if(o.hookGive)c+=tag("c-ow","+ "+o.hookGive+" · брехня тягне брехню");
else if(A.give)c+=tag("c-ow","+ "+A.give)}
if(o.kind==="still"){
c+=tag("c-ok","ПОБАЧИШ ЩЕ ОДНЕ");
c+=tag("c-dn",C().dnW||"тихіше на три");
if(C().clock)c+=tag("c-cl","годинник +1 хвилина");
if(A.give)c+=tag("c-ow","ціна: кімната візьме "+A.give.toLowerCase())}
if(o.kind==="speak"){
if(C().clock&&!F.owe.length)c+=tag("c-ok","нічого не надішле");
else if(sees())c+=tag("c-ok","знімає чуже: ти бачив, про що кажеш");
else c+=tag("c-no","ти ще нічого не бачив. Відскочить");
if(C().speakVol)c+=tag("c-up","чим більше вкладено, тим дорожче: +"+C().speakVol());
else c+=tag("c-up",S.vol>=5?((C().pressW||"кімната тисне")+" вдвічі"):(C().pressW||"кімната тисне"));
if(A.give)c+=tag("c-dn","не візьме "+A.give.toLowerCase())}
return c+'</span>'}

function rwTarget(){

var i;
for(i=F.owe.length-1;i>=0;i--)if(K.rw[F.owe[i]])return F.owe[i];
return null}

var A=K.asks[F.i];
if(A.hook&&F.owe.indexOf(A.hook)<0){F.i++;ask();return}

+(A.give?'<b class="c-ow">кімната допише своє: + '+A.give.toLowerCase()+'</b>':'')+'</span></button>';

resolve(A,A.opts[+b.dataset.o])}})})}

function rewrite(A,pt){
acts("");
var K=C(),amb=ambient();
if(S.vol>=VMAX){burn(true);return}
var L=[];
if(amb)L.push({w:"n",t:"Уся справа разом тихо нагадує про себе. Стає гучніше."});
var idx=F.owe.indexOf(pt);
if(idx>=0)F.owe.splice(idx,1);
var R=K.rw[pt];
F.facts.push({k:R.k,s:R.s,t:R.t});
vol(1);
if(A.give)F.owe.push(A.give);
barR();
L.push({w:"mx",t:R.say});
L.push({w:"n",t:R.r});
L.push({w:"nv",t:R.nv});
if(A.give)L.push({w:"n",t:"Поки Макс переписував учорашнє, клерк дописав сьогоднішнє: «"+A.give.toLowerCase()+"»."});
if(S.vol>=VMAX){say(L,function(){burn(true)});return}
say(L,function(){F.i++;if(A.go)setMode(A.go);barR();ask()})}

function ambient(){var a=Math.floor(F.owe.length*0.5);if(a>0){vol(a);barR()}return a}

function resolve(A,o){
acts("");
var K=C(),amb=ambient();
if(S.vol>=VMAX){burn(true);return}
var L=[];
if(amb)L.push({w:"n",t:K.ambT||(K.legend
?"Уся легенда разом тихо нагадує про себе. Тримати її стає гучніше."
:"Усе, що вже висить на Максі, тихо нагадує про себе. Стає гучніше.")});

if(o.kind==="yield"){
vol(K.yieldVol!==undefined?K.yieldVol:1);
var g=o.hookGive||A.give;
if(g)F.owe.push(g);
L.push({w:"n",t:o.r});
if(o.nv)L.push({w:"nv",t:o.nv});
}

if(o.kind==="still"){
if(F.mom<3)F.mom++;
vol(-3);
if(A.give)F.owe.push(A.give);
L.push({w:"n",t:o.r});
if(F.facts.length<K.seams.length){
var s=K.seams[F.facts.length];F.facts.push(s);
L.push({w:"nv",t:"Тихіше. Нарешті чути. Дивись."});
L.push({w:"nv",t:s.t});
if(!F.taught){F.taught=true;
L.push({w:"nv",t:"Ось так це працює. Ти дав мені дві секунди, я дав тобі очі."});
L.push({w:"nv",t:"Так, вони за це щось повісили. Побачене лишається назавжди, а річ ти зараз знімеш. Воно того варте."})}
}else L.push({w:"nv",t:"Тихо. Я показав усе, що бачив. Далі словами, і це вже ти."});
}

if(o.kind==="speak"){
$("stageBox").classList.add("push");
setTimeout(function(){$("stageBox").classList.remove("push")},400);
var hot=S.vol>=5&&sees()>0;
vol(K.speakVol?K.speakVol():(hot?2:1));
if(o.l.charAt(0)==="\u00AB")L.push({w:K.flame?"nv":"mx",t:o.l});
L.push({w:"n",t:o.r});
if(F.owe.length&&sees()){
var rm=F.owe.pop();
L.push({w:"n",t:K.legend
?"Одна історія відклеюється від Макса і лишається лежати: "+rm.toLowerCase()+"."
:"Щось чуже сповзає з Макса і лишається позаду: "+rm.toLowerCase()+"."});
if(o.nv)L.push({w:"nv",t:o.nv});
}else if(F.owe.length){
L.push({w:"nv",t:"Не зачепило. Ти сказав, що не хочеш, а не що бачиш."});
L.push({w:"nv",t:"Зупинись хоч раз. Дай мені дві секунди, і я покажу, чим їх спинити."});
}else if(o.nv)L.push({w:"nv",t:o.nv});
if(hot)L.push({w:"nv",t:"І тепер вони тиснуть удвічі. Я казав: спершу тиша."});
}

if(K.clock){var cd=K.clock[o.kind]||0;
if(cd){F.clock+=cd;clkR();
L.push({w:"n",t:cd>0?("Годинник клацає. "+clk()+"."):("Годинник відкочується назад. Знову "+clk()+".")})}}
barR();
if(S.vol>=VMAX){say(L,function(){burn(true)});return}
say(L,function(){F.i++;if(A.go)setMode(A.go);barR();ask()})}

var K=C();
say([{w:"n",t:auto?K.burnL:K.burnM},
{w:"n",t:K.burn2||"Три секунди тиші. Усі чемно кивають. Стає легше. Секунди на три."},

{w:"n",t:"Полароїд цього моменту обвуглюється по краях і падає кудись у Альбом."}],

var K=C(),keep=F.facts.slice();

function sealEnd(fl,ex){
var bad=[];
if(ex===2&&F.owe.length)bad.push("вихід 2 при непорожній колонці боргу ("+F.owe.length+")");
if(ex===4&&!(S.vol<=4&&F.owe.length&&F.facts.length>=2))bad.push("вихід 4 без умов: гучність "+S.vol+", борг "+F.owe.length+", швів "+F.facts.length);
if(ex>1&&S.vol>=6)bad.push("вихід "+ex+" при гучності "+S.vol);
if(ex===3&&!F.facts.length)bad.push("вихід 3 без жодного шва");
if(F.mom>3)bad.push("зупинок "+F.mom+" (максимум 3)");
if(bad.length)console.warn("[СНИ][БАГ] поверх "+fl+": "+bad.join(" · "));
return !bad.length}

:(K.flame?"Ти доніс усе, що хотів.":"Чужого на Максі не лишилось."));
$("finTxt").textContent=K.sci+(K.tail[ex]||"");
$("fin").classList.remove("hidden");
if(totalMom()>=10&&meta(0).done&&!META.season){META.season=true;sealSeason();
$("finOk").textContent="Ліфт зупиняється сам"}

/* Нуль localStorage. Прогрес живе тільки в коді.
   На поверх: вихід(3) · проходжень(2) · зупинок(2) = 7 біт. Два поверхи = 14.
   Плюс згоріло(4) і ДІМ(1) = 19, плюс сума(4) = 23 → 5 символів base32. */
var ALPH="АБВГДЕЖЗИКЛМНПРСТУФХЦЧШЩЮЯ234567";
var NF=5;
function packCode(){
var v=0,i,M;
for(i=1;i<=NF;i++){M=meta(i);
v=(v*8)+(M.exit&7);
v=(v*4)+(Math.min(M.runs,3)&3);
v=(v*4)+(Math.min(M.best,3)&3)}
var M0=meta(0);
v=(v*8)+(M0.exit&7);
v=(v*4)+(Math.min(M0.best,3)&3);
v=(v*16)+(Math.min(META.ashes,15)&15);
v=(v*2)+(S.dim?1:0);
var sum=0,vv=v;while(vv>0){sum=(sum+(vv%16))&15;vv=Math.floor(vv/16)}
v=(v*16)+sum;
var out="",cu=0,ci;
for(i=9;i>=0;i--)out+=ALPH.charAt(Math.floor(v/Math.pow(32,i))%32);
for(ci=0;ci<SLOTS.length;ci++)cu=cu*3+(CUS[SLOTS[ci].k]%3);
out+=ALPH.charAt(Math.floor(cu/32)%32)+ALPH.charAt(cu%32);
return "ПУХ-"+out}
function unpackCode(str){
var t=str.trim().toUpperCase().replace("ПУХ-","").replace(/\s/g,"");
if(t.length!==12)return null;
var v=0,i,d;
for(i=0;i<10;i++){d=ALPH.indexOf(t.charAt(i));if(d<0)return null;v=v*32+d}
var ch=ALPH.indexOf(t.charAt(10)),cl=ALPH.indexOf(t.charAt(11));
if(ch<0||cl<0)return null;
var cus=ch*32+cl;
if(cus>728)return null;
var sum=v%16;v=Math.floor(v/16);
var chk=0,vv=v;while(vv>0){chk=(chk+(vv%16))&15;vv=Math.floor(vv/16)}
if(chk!==sum)return null;
var dim=v%2;v=Math.floor(v/2);
var ash=v%16;v=Math.floor(v/16);
var f0b=v%4;v=Math.floor(v/4);
var f0e=v%8;v=Math.floor(v/8);
if(f0e>4)return null;
var fl={},i2;
for(i2=NF;i2>=1;i2--){
var best=v%4;v=Math.floor(v/4);
var runs=v%4;v=Math.floor(v/4);
var exi=v%8;v=Math.floor(v/8);
if(exi>4)return null;
fl[i2]={done:exi>0,exit:exi,runs:runs,best:best}}
if(v!==0)return null;
return {f:fl,f0:{done:f0e>0,exit:f0e,best:f0b},cus:cus,ashes:ash,dim:!!dim}}

M=meta(0);if(M.done)parts.push("поверх без цифри: «"+D[0].exn[M.exit]+"»");
$("codeBig").textContent=c;
$("codeWhat").textContent="У коді: "+(parts.join("; ")||"поки нічого")+". Згоріло: "+META.ashes+"."+(S.dim?" І що ти прийшов із сезону 1.":"");
$("codeM").classList.remove("hidden")}

return}

function goodsFor(slot,order,G){
 var h="",wi,k,pl=pull();
 for(wi=0;wi<order.length;wi++){
  for(k in P){
   var p=P[k];
   if(p.slot!==slot||p.wing!==order[wi]||!avail(k))continue;
   var st=fitState(k,G),tag="";
   if(C.mode===1){
    if(slot==="why")tag=(st==="fit")?'<span class="src ok">його власна</span>'
      :(st==="borrow"?'<span class="src no">чужа</span>':'<span class="src no">це не мета</span>');
    else if(st==="numb")tag='<span class="src no">знеболення. Нічому не служить</span>';
    else if(st==="trap")tag='<span class="src bad">ламає мету</span>';
    else if(st==="fit")tag='<span class="src ok">сходиться</span>';
    else tag='<span class="src no">не підтверджено</span>';
   }
   h+='<span class="g'+(C.mode===1?" "+p.wing:"")+(S.chq[slot]===k?" in":"")+'"><span class="top">'
    +'<button class="gt" id="G'+k+'"'+(p.wing==="Z"?' style="font-size:'+(12*pl).toFixed(1)+'px"':'')+'>'+esc(p.t)+'</button>'
    +'<button class="gi" id="I'+k+'">і</button></span>'
    +(p.vim?'<span class="src vim">потрібно: '+esc(p.vim)+'</span>':'')+tag+'</span>';
  }
 }
 return h;
}

/* Формула. Уся виводима з того, що на стрічці. Прихованих списків нема. */
function resolve(){
 var G=given(),z=0,emp=0,fit=0,trap=0,i,k,id,why=null;
 for(i=0;i<4;i++){
  k=SLOTS[i][0];id=S.chq[k];
  if(!id){emp++;continue}
  if(P[id].wing==="Z")z++;
  if(k==="why"){why=fitState(id,G);continue}
  var st=fitState(id,G);
  if(st==="fit")fit++;else if(st==="trap")trap++;
 }
 S.dim=z;S.fit=fit;S.trap=trap;
 if(emp>0)return "gray";
 if(why==="numb"||z>=2)return "flat";
 if(why==="borrow")return "borrow";
 if(trap>0)return "wash";
 if(fit===3)return "native";
 if(fit>=1)return "wash";
 return "gray";
}
function breakWhy(k,G){var p=P[k],bk;if(!p.breaks)return "";for(bk in p.breaks)if(G[bk])return p.breaks[bk];return ""}
/* Рахунок, а не вирок. Гра може це сказати, бо вона це справді порахувала. */
function bill(){
 var G=given(),h="",i,k,id,p,st,note;
 for(i=0;i<4;i++){
  k=SLOTS[i][0];id=S.chq[k];
  if(!id){h+='<div class="bl gray"><b>'+SLOTS[i][1]+'</b><span>порожньо</span><i>рядок не заповнено</i></div>';continue}
  p=P[id];st=fitState(id,G);
  if(k==="why")note=(st==="fit")?"його власна":(st==="borrow"?"чужа. Три наступні рядки служитимуть не йому":"це не мета. Три наступні рядки стають ні до чого");
  else if(st==="numb")note="знеболення. Нічому не служить";
  else if(st==="trap")note="ламає мету: "+breakWhy(id,G);
  else if(st==="fit")note="сходиться: "+p.vim;
  else note="не підтверджено: "+p.vim;
  h+='<div class="bl '+st+'"><b>'+SLOTS[i][1]+'</b><span>'+esc(p.t)+'</span><i>'+esc(note)+'</i></div>';
 }
 return '<div class="bill">'+h+'</div>';
}

--night:#16305E;--panel:#2E5498;--deep:#1C3A74;--line:#0F2148;
--cream:#EAF4FF;--mist:#BCD4EE;--dim:#8FB4E4;
--gold:#FFB35C;--goldD:#D9861E;
--ember:#FF8A2A;--emberD:#E8912E;--hot:#FFE8C0;
}
*{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation}
html,body{height:100%}
body{background:var(--night);color:var(--cream);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;justify-content:center}
#wrap{width:100%;max-width:430px;min-height:100%;min-height:100svh;display:flex;flex-direction:column;background:var(--night)}
.px{font-family:'Press Start 2P','Courier New',monospace}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
.screen{flex:1;display:flex;flex-direction:column}
.hidden{display:none !important}

#intro{padding:24px 18px;align-items:center;text-align:center;gap:11px;justify-content:center}
.logo{font-size:19px;color:var(--gold);letter-spacing:1px;line-height:1.55}
.season{font-size:9px;color:var(--dim);letter-spacing:2px}
.tag{color:var(--mist);font-size:14px;line-height:1.6;max-width:330px}
.notice{background:var(--deep);border:3px solid var(--line);padding:12px;font-size:12.5px;color:var(--mist);line-height:1.65;text-align:left;max-width:360px}
.notice b{color:var(--cream)}
.abtn{width:100%;max-width:360px;background:var(--panel);border:3px solid var(--line);box-shadow:0 4px 0 var(--line);color:var(--cream);padding:13px 12px;font-size:14px;text-align:left;line-height:1.45;margin-top:8px}
.abtn:active{transform:translateY(4px);box-shadow:none}
.abtn.gold{background:var(--gold);color:#241B00;font-weight:700}
.small{font-size:11px;color:var(--dim);line-height:1.6}

#hud{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px 8px;border-bottom:3px solid var(--line);background:var(--deep)}
#nightTag{font-size:9px;color:var(--gold);letter-spacing:1px}
#whoTag{font-size:9px;color:var(--dim);letter-spacing:1px}
#heartBtn{width:36px;height:36px;flex:none;background:var(--panel);border:3px solid var(--line);box-shadow:0 3px 0 var(--line);color:var(--cream);font-size:15px;line-height:1}

#stageBox{position:relative;width:100%;padding-bottom:65.8%;overflow:hidden}
#room,#fg{position:absolute;left:0;top:0;width:100%;height:100%;image-rendering:pixelated}
#fg{pointer-events:none;z-index:4}
#stageBox svg{isolation:isolate}
.brB{animation:brh 4.4s ease-in-out infinite}
@keyframes brh{0%,100%{transform:translateY(0)}50%{transform:translateY(-1px)}}
.mote{transform-box:fill-box;transform-origin:center;animation:agF 8s ease-in-out infinite}
@keyframes agF{0%{transform:translate(0,0);opacity:.1}50%{transform:translate(1px,-6px);opacity:.55}100%{transform:translate(0,0);opacity:.1}}
@media (prefers-reduced-motion:reduce){.mote,.brB{animation:none}}

.pile{position:absolute;bottom:5%;width:14%;z-index:3;text-align:center}
#pileL{left:1%}
#pileR{right:1%}
.pile .stk{height:52px;display:flex;flex-direction:column-reverse;align-items:center;justify-content:flex-start;gap:1px}
.pile .stk i{display:block;width:88%;height:5px;border:1px solid var(--line)}
#pileL .stk i{background:var(--emberD)}
#pileR .stk i{background:var(--goldD)}
.pile .plab{font-size:6.5px;letter-spacing:.5px;margin-top:4px;line-height:1.4}
#pileL .plab{color:var(--ember)}
#pileR .plab{color:var(--gold)}

#card{position:absolute;left:50%;top:8%;width:204px;margin-left:-102px;min-height:108px;
background:#F4EAD6;color:#1C3A74;border:4px solid var(--line);box-shadow:0 6px 0 rgba(0,0,0,.4);
padding:18px 14px;display:flex;align-items:center;justify-content:center;text-align:center;
font-size:14.5px;line-height:1.5;z-index:2;cursor:grab;transition:transform .18s,opacity .18s}
#card.off{pointer-events:none}
#card.on{cursor:grabbing}
#card.tl{border-color:var(--ember);background:#FBE3CB}
#card.tr{border-color:var(--gold);background:#F8EFCB}
#card .bg{position:absolute;top:5px;font-size:7.5px;letter-spacing:1px;opacity:0;transition:opacity .1s}
#card .bgl{left:8px;color:var(--emberD)}
#card .bgr{right:8px;color:var(--goldD)}
#card.tl .bgl{opacity:1}
#card.tr .bgr{opacity:1}

#flameW{transform-origin:center;transition:transform .2s ease-in}
#flameW.turn{transform:scaleX(.1)}
.fA{animation:fk .62s steps(1,end) infinite}
.fB{animation:fk .62s steps(1,end) infinite;animation-delay:.31s;opacity:0}
@keyframes fk{0%,49%{opacity:1}50%,100%{opacity:0}}
#hand{opacity:0;transition:opacity .25s}

#dialog{background:var(--deep);border-top:3px solid var(--line);padding:12px 14px 14px;min-height:96px;position:relative;cursor:pointer}
#spk{font-size:9px;letter-spacing:1px;display:flex;align-items:center;gap:6px;margin-bottom:8px}
.dot{width:9px;height:9px;display:inline-block;border:1px solid var(--line)}
#txt{font-size:14.5px;line-height:1.62}
#cue{position:absolute;right:12px;bottom:8px;color:var(--gold);font-size:12px;animation:bl .8s steps(1,end) infinite}
@keyframes bl{0%,49%{opacity:1}50%,100%{opacity:0}}
#taphint{position:absolute;right:12px;bottom:8px;color:var(--ember);font-size:9px;letter-spacing:1px;animation:bl .8s steps(1,end) infinite}
/* ноутбук: кімната зліва, розмова і свайпи справа */
@media (min-width:880px) and (min-height:520px){
 #wrap{max-width:1240px}
 #intro{max-width:640px;margin:0 auto;width:100%}
 #panel{max-width:680px;margin:0 auto;width:100%}
 #game{display:grid;grid-template-columns:minmax(0,56%) minmax(0,44%);grid-template-rows:auto auto auto 1fr;align-content:start}
 #hud{grid-column:1/-1}
 #stageBox{grid-column:1;grid-row:2/5;align-self:start;border-right:3px solid var(--line)}
 #dialog{grid-column:2;grid-row:2;border-top:none}
 #ctl{grid-column:2;grid-row:3}
 #rule{grid-column:2;grid-row:4;align-self:start}
}

#ctl{padding:10px 12px 4px;display:flex;gap:8px}
.sw{flex:1;background:var(--panel);border:3px solid var(--line);box-shadow:0 4px 0 var(--line);color:var(--cream);padding:13px 4px;font-size:10px;letter-spacing:1px;line-height:1.5}
.sw:active{transform:translateY(4px);box-shadow:none}
.sw.l{border-color:var(--emberD);color:var(--ember)}
.sw.r{border-color:var(--goldD);color:var(--gold)}
#rule{padding:8px 14px 14px;font-size:11.5px;color:var(--dim);line-height:1.6;text-align:center}

#panel{padding:14px;display:none;flex-direction:column;gap:10px;overflow-y:auto}
.pc{background:var(--panel);border:3px solid var(--line);padding:12px}
.pc .cap{font-size:8px;letter-spacing:1px;margin-bottom:9px}
.pc.left .cap{color:var(--ember)}
.pc.right .cap{color:var(--gold)}
.pc.left{opacity:.66}
.two{display:flex;gap:8px}
.two .pc{flex:1;min-width:0}
h2.px{font-size:13px;color:var(--gold);letter-spacing:1px;line-height:1.6;text-align:center;margin:4px 0}
.ln{font-size:12.5px;line-height:1.55;padding:4px 0}
.ln.fire{color:var(--ember)}
.ln.move{color:var(--gold)}
.none{font-size:11.5px;color:var(--dim);font-style:italic;padding-top:8px;border-top:1px solid #27488A;margin-top:8px}
.loopn{font-size:11.5px;color:var(--ember);padding-top:8px;border-top:1px solid var(--emberD);margin-top:8px}
.pc .big{font-size:12px;color:var(--gold);line-height:1.7;letter-spacing:1px}
.pc p{font-size:13px;line-height:1.65;color:var(--mist);margin-top:6px}
.pc.mor{border-color:var(--goldD)}
.pc.mor .cap{color:var(--gold)}
.pc.mor .ln{color:var(--cream);font-size:14px}
.pc.safe{border-color:var(--goldD);background:#2E3A5E}
.tel{color:var(--gold);font-weight:700}
.eqrow{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--mist);padding:6px 0;line-height:1.5}
.eqrow b{color:var(--ember)}
.eqrow.g b{color:var(--gold)}

#smodal{display:none;position:fixed;inset:0;background:rgba(11,14,34,.9);z-index:60;align-items:center;justify-content:center;padding:18px}
#smodal .box{background:var(--panel);border:4px solid var(--line);padding:18px;max-width:360px}
#smodal h3{font-size:12px;color:var(--gold);margin-bottom:10px;letter-spacing:1px}
#smodal p{font-size:13px;line-height:1.65;color:var(--mist);margin-bottom:10px}

#flameW,#introFlame,.mfl svg{filter:drop-shadow(0 0 8px rgba(255,154,62,.5))}
.blocks i{background:#27488A;border-color:#0F2148}

function nextLine(){

 if(!dq.length){$("cue").classList.add("hidden");if(dcb){var c=dcb;dcb=null;c()}return}
 var L=dq.shift();spk(L.w);type(L.t);
}
function spk(w){

 if(w==="f")s.innerHTML='<span class="dot" style="background:#FF8A2A"></span><span class="px" style="color:#FF9E55">ВОГНИК</span>';

 else s.innerHTML='<span class="px" style="color:#8FB4E4">&#183;&#183;&#183;</span>';
}
function type(t){
 full=t;var tx=$("txt");tx.textContent="";$("cue").classList.add("hidden");
 typing=true;var i=0;
 ti=setInterval(function(){i+=2;tx.textContent=full.slice(0,i);
  if(i>=full.length){clearInterval(ti);typing=false;$("cue").classList.remove("hidden")}},18);
}
function waitTap(cb){tapPending=cb;$("taphint").classList.remove("hidden")}
function doTap(){if(!tapPending)return;var t=tapPending;tapPending=null;$("taphint").classList.add("hidden");t()}
function tapAdvance(e){
 if(live)return;
 if(e&&e.target&&e.target.closest&&e.target.closest("#heartBtn"))return;
 if(tapPending){doTap();return}
 nextLine();
}
$("game").addEventListener("click",tapAdvance);
document.addEventListener("keydown",function(e){
 if(live){
  if(e.key==="ArrowLeft"){e.preventDefault();commit("L")}
  if(e.key==="ArrowRight"){e.preventDefault();commit("R")}
 }else if(e.key==="Enter"||e.key===" "){e.preventDefault();if(tapPending)doTap();else nextLine()}
});

var card=$("card"),dragging=false,sx=0,dx=0,live=false,cur=null,onDone=null;
function showStatic(c){
 cur=null;live=false;
 card.classList.add("off");card.classList.remove("tl","tr");
 $("cardTxt").textContent=c.t;
 card.style.transition="none";card.style.transform="";card.style.opacity="1";
 void card.offsetWidth;card.style.transition="";
 $("ctl").classList.add("hidden");$("rule").classList.add("hidden");
}
function showCard(c,cb){
 cur=c;onDone=cb;live=true;
 card.classList.remove("off","tl","tr");
 $("cardTxt").textContent=c.t;
 card.style.transition="none";card.style.transform="";card.style.opacity="1";
 void card.offsetWidth;card.style.transition="";
 $("ctl").classList.remove("hidden");$("rule").classList.remove("hidden");
}
function hideCard(){
 live=false;cur=null;card.classList.add("off");card.style.opacity="0";
 $("ctl").classList.add("hidden");$("rule").classList.add("hidden");
}
card.addEventListener("pointerdown",function(e){
 if(!live)return;dragging=true;sx=e.clientX;dx=0;
 card.classList.add("on");card.style.transition="none";
 try{card.setPointerCapture(e.pointerId)}catch(err){}
});
card.addEventListener("pointermove",function(e){
 if(!dragging)return;
 dx=e.clientX-sx;
 card.style.transform="translateX("+dx+"px) rotate("+(dx*0.035).toFixed(2)+"deg)";
 card.classList.toggle("tl",dx<-24);
 card.classList.toggle("tr",dx>24);
});
function release(){
 if(!dragging)return;dragging=false;card.classList.remove("on");card.style.transition="";
 if(dx<-70)commit("L");
 else if(dx>70)commit("R");
 else{card.style.transform="";card.classList.remove("tl","tr")}
 dx=0;
}
card.addEventListener("pointerup",release);
card.addEventListener("pointercancel",release);
$("swL").onclick=function(){commit("L")};
$("swR").onclick=function(){commit("R")};

function flyTo(side,cb){
 var pile=(side==="L"?$("pileL"):$("pileR")).getBoundingClientRect();
 var c=card.getBoundingClientRect();
 var tx=(pile.left+pile.width/2)-(c.left+c.width/2);
 var ty=(pile.top+14)-(c.top+c.height/2);
 card.style.transition="transform .32s ease-in,opacity .32s ease-in";
 card.style.transform="translate("+tx+"px,"+ty+"px) scale(.14) rotate("+(side==="L"?-12:12)+"deg)";
 card.style.opacity="0";
 setTimeout(cb,320);
}
function commit(side){
 if(!live)return;
 live=false;card.classList.add("off");
 $("ctl").classList.add("hidden");$("rule").classList.add("hidden");
 var c=cur,done=onDone;
 flyTo(side,function(){card.style.opacity="0";done(c,side)});
}

function startNight(k){

function deal(i){
 S.i=i;
 var d=NIGHTS[S.n].deck;
 if(i>=d.length){morning();return}
 var c=d[i];
 if(c.pre)say([{w:"p",t:c.pre}],function(){showCard(c,onCard)});
 else showCard(c,onCard);
}
function onCard(c,side){
 if(c.k==="v"){
  fileCard(c,side);
  S.keys[S.n+1]=side;
  if(side==="R"){S.trust+=(S.post?1:-2)}else{S.trust+=(S.post?0:2)}
  say(c[side],function(){deal(S.i+1)});
  return;
 }
 var right=(c.k==="s")?"L":"R";
 var lines;
 if(side===right){
  fileCard(c,side);
  if(side==="L"&&c.okL)lines=c.okL.slice();
  else if(side==="R"&&c.okR)lines=c.okR.slice();
  else lines=(c.k==="s")?[{w:"p",t:"Це робить тіло. СИГНАЛ, ліворуч."}]:[{w:"p",t:"Це вже значення, твоя версія. Праворуч."}];
 }else{
  fileCard(c,right);
  lines=(c.k==="s")
   ?[{w:"p",t:"Ні. Це тіло робить само. Ліворуч, у СИГНАЛ."}]
   :[{w:"p",t:"Ні. Тіло цього не робить. Це людина про нього думає. Праворуч, у ЗНАЧЕННЯ."}];
 }
 say(lines,function(){deal(S.i+1)});
}
