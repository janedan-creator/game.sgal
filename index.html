}

#meta{display:flex;justify-content:space-between;align-items:center;padding:8px 14px 0}

.task .px{font-size:9px;letter-spacing:1px}
.hiddenF{display:none}

.chip.sel{background:var(--moss);color:#0E2B1E;font-weight:700}
.chip[disabled]{opacity:.55;cursor:not-allowed}

#preview b{color:var(--gold)}
.slices{display:flex;gap:3px;height:14px;border:2px solid var(--line);background:#343B63}
.slices i{flex:1;background:transparent}
.slices i.on{background:var(--mist)}
.slices i.me.on{background:var(--gold)}
.crow{display:flex;gap:8px;align-items:stretch}
.arw{width:46px;flex:none;background:var(--panel);border:3px solid var(--line);box-shadow:0 3px 0 var(--line);color:var(--gold);font-size:14px}
.arw:active{transform:translateY(3px);box-shadow:none}
.cval{flex:1;background:var(--deep);border:3px solid var(--line);padding:7px 8px;text-align:center;font-size:14px;line-height:1.35}
.cval .lab{display:block;font-size:8px;letter-spacing:1px;color:var(--mist);margin-bottom:3px}
.itemrow{display:flex;gap:8px}
.itemrow .chip{flex:1;text-align:center}

.screen{flex:1;display:flex;flex-direction:column}

#introFlame{margin:0 auto}
.notice{background:var(--deep);border:3px solid var(--line);padding:12px 14px;font-size:13px;color:var(--mist);text-align:left;line-height:1.6}
.field label{display:block;font-size:9px;letter-spacing:1px;color:var(--mist);margin-bottom:6px;text-align:left}
.field input{width:100%;background:var(--panel);border:3px solid var(--line);box-shadow:inset 0 3px 0 rgba(0,0,0,.35);color:var(--cream);padding:12px;font-size:16px}
.small{font-size:11.5px;color:var(--dim)}

#mirror{padding:18px 16px 26px;gap:14px;display:none;flex-direction:column}

.mcard.end{border-color:var(--goldD);background:#33290F}

.codecard{background:#33290F;border:3px solid var(--goldD);box-shadow:0 3px 0 var(--line);padding:12px 14px;text-align:center}
.codecard .cd{font-size:15px;letter-spacing:2px;color:var(--gold);margin-top:6px}

#codeRow input{flex:1;min-width:0;background:var(--panel);border:3px solid var(--line);color:var(--cream);padding:12px;font-size:16px;letter-spacing:1px;text-transform:uppercase}

.hidden{display:none !important}

}

@keyframes brz{0%,100%{transform:scale(var(--fs,1))}50%{transform:scale(calc(var(--fs,1)*1.045))}}
.arr{float:right;color:var(--goldD)}

@media (prefers-reduced-motion:reduce){#heroBr,#eyesG rect,.brB,.blinkE rect,.mote{animation:none}}

function rewrite(A,pt){
acts("");
var K=C(),amb=ambient();
if(S.vol>=VMAX){burn(true);return}
var L=[];
if(amb)L.push({w:"n",t:"Уся справа разом тихо нагадує про себе. Стає гучніше."});
var idx=F.owe.indexOf(pt);
if(idx>=0)F.owe.splice(idx,1);
var R=K.rw[pt];
F.facts.push({k:R.k,s:R.s,t:R.t});
vol(1);
if(A.give)F.owe.push(A.give);
barR();
L.push({w:"mx",t:R.say});
L.push({w:"n",t:R.r});
L.push({w:"nv",t:R.nv});
if(A.give)L.push({w:"n",t:"Поки Макс переписував учорашнє, клерк дописав сьогоднішнє: «"+A.give.toLowerCase()+"»."});
if(S.vol>=VMAX){say(L,function(){burn(true)});return}
say(L,function(){F.i++;if(A.go)setMode(A.go);barR();ask()})}

var K=C(),amb=ambient();
if(S.vol>=VMAX){burn(true);return}
var L=[];

?"Уся легенда разом тихо нагадує про себе. Тримати її стає гучніше."
:"Усе, що вже висить на Максі, тихо нагадує про себе. Стає гучніше.")});

if(o.kind==="yield"){
vol(K.yieldVol!==undefined?K.yieldVol:1);
var g=o.hookGive||A.give;
if(g)F.owe.push(g);
L.push({w:"n",t:o.r});
if(o.nv)L.push({w:"nv",t:o.nv});
}

if(o.kind==="still"){
if(F.mom<3)F.mom++;
vol(-3);
if(A.give)F.owe.push(A.give);
L.push({w:"n",t:o.r});
if(F.facts.length<K.seams.length){
var s=K.seams[F.facts.length];F.facts.push(s);
L.push({w:"nv",t:"Тихіше. Нарешті чути. Дивись."});
L.push({w:"nv",t:s.t});
if(!F.taught){F.taught=true;
L.push({w:"nv",t:"Ось так це працює. Ти дав мені дві секунди, я дав тобі очі."});
L.push({w:"nv",t:"Так, вони за це щось повісили. Побачене лишається назавжди, а річ ти зараз знімеш. Воно того варте."})}
}else L.push({w:"nv",t:"Тихо. Я показав усе, що бачив. Далі словами, і це вже ти."});
}

if(o.kind==="speak"){
$("stageBox").classList.add("push");
setTimeout(function(){$("stageBox").classList.remove("push")},400);
var hot=S.vol>=5&&sees()>0;
vol(K.speakVol?K.speakVol():(hot?2:1));
if(o.l.charAt(0)==="\u00AB")L.push({w:K.flame?"nv":"mx",t:o.l});
L.push({w:"n",t:o.r});
if(F.owe.length&&sees()){
var rm=F.owe.pop();
L.push({w:"n",t:K.legend
?"Одна історія відклеюється від Макса і лишається лежати: "+rm.toLowerCase()+"."
:"Щось чуже сповзає з Макса і лишається позаду: "+rm.toLowerCase()+"."});
if(o.nv)L.push({w:"nv",t:o.nv});
}else if(F.owe.length){

/* ================= КОД ПУХ ================= */
/* Нуль localStorage. Прогрес живе тільки в коді.
   На поверх: вихід(3) · проходжень(2) · зупинок(2) = 7 біт. Два поверхи = 14.
   Плюс згоріло(4) і ДІМ(1) = 19, плюс сума(4) = 23 → 5 символів base32. */
var ALPH="АБВГДЕЖЗИКЛМНПРСТУФХЦЧШЩЮЯ234567";
var NF=5;
function packCode(){
var v=0,i,M;
for(i=1;i<=NF;i++){M=meta(i);
v=(v*8)+(M.exit&7);
v=(v*4)+(Math.min(M.runs,3)&3);
v=(v*4)+(Math.min(M.best,3)&3)}
var M0=meta(0);
v=(v*8)+(M0.exit&7);
v=(v*4)+(Math.min(M0.best,3)&3);
v=(v*16)+(Math.min(META.ashes,15)&15);
v=(v*2)+(S.dim?1:0);
var sum=0,vv=v;while(vv>0){sum=(sum+(vv%16))&15;vv=Math.floor(vv/16)}
v=(v*16)+sum;
var out="",cu=0,ci;
for(i=9;i>=0;i--)out+=ALPH.charAt(Math.floor(v/Math.pow(32,i))%32);
for(ci=0;ci<SLOTS.length;ci++)cu=cu*3+(CUS[SLOTS[ci].k]%3);
out+=ALPH.charAt(Math.floor(cu/32)%32)+ALPH.charAt(cu%32);
return "ПУХ-"+out}
function unpackCode(str){
var t=str.trim().toUpperCase().replace("ПУХ-","").replace(/\s/g,"");
if(t.length!==12)return null;
var v=0,i,d;
for(i=0;i<10;i++){d=ALPH.indexOf(t.charAt(i));if(d<0)return null;v=v*32+d}
var ch=ALPH.indexOf(t.charAt(10)),cl=ALPH.indexOf(t.charAt(11));
if(ch<0||cl<0)return null;
var cus=ch*32+cl;
if(cus>728)return null;
var sum=v%16;v=Math.floor(v/16);
var chk=0,vv=v;while(vv>0){chk=(chk+(vv%16))&15;vv=Math.floor(vv/16)}
if(chk!==sum)return null;
var dim=v%2;v=Math.floor(v/2);
var ash=v%16;v=Math.floor(v/16);
var f0b=v%4;v=Math.floor(v/4);
var f0e=v%8;v=Math.floor(v/8);
if(f0e>4)return null;
var fl={},i2;
for(i2=NF;i2>=1;i2--){
var best=v%4;v=Math.floor(v/4);
var runs=v%4;v=Math.floor(v/4);
var exi=v%8;v=Math.floor(v/8);
if(exi>4)return null;
fl[i2]={done:exi>0,exit:exi,runs:runs,best:best}}
if(v!==0)return null;
return {f:fl,f0:{done:f0e>0,exit:f0e,best:f0b},cus:cus,ashes:ash,dim:!!dim}}

return}
